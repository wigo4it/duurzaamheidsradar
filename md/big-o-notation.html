<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="@markdown.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <div id="markdown-container">Loading...</div>

    <script>
        function updateContentAndTitle(filePath) {
            fetch(filePath)
                .then(response => response.text())
                .then(text => {
                    document.getElementById('markdown-container').innerHTML = marked.parse(text);
                    const title = filePath.split('/').pop().split('.').shift();
                    document.title = title.charAt(0).toUpperCase() + title.slice(1);
                })
                .catch(err => console.error('Error loading the markdown file:', err));
        }

        function init() {
            // Load Markdown based on HTML file name if no specific link is clicked
            const htmlFileName = window.location.pathname.split('/').pop().split('.').shift();
            const markdownFileName = `${htmlFileName}.md`;
            updateContentAndTitle(markdownFileName);

            // Setup click event listeners for links
            document.querySelectorAll('a[data-mdfile]').forEach(link => {
                link.addEventListener('click', function(event) {
                    event.preventDefault();
                    const filePath = this.getAttribute('data-mdfile');
                    updateContentAndTitle(filePath);
                });
            });
        }

        init();
    </script>

</body>

</html>
