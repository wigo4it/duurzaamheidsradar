<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="wiki.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const wikiKey = params.get('page');
            if (wikiKey) {
                const markdownFile = wikiKey + '.md'; // Append .md to the wikiKey
    
                // Function to capitalize the first letter of a string
                function capitalizeFirstLetter(string) {
                    return string.charAt(0).toUpperCase() + string.slice(1);
                }
    
                // Remove the .md extension and capitalize the first letter
                const pageTitle = capitalizeFirstLetter(wikiKey);
    
                // Set the document's title
                document.title = pageTitle;
    
                fetch(markdownFile)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok');
                        }
                        return response.text();
                    })
                    .then(markdown => {
                        const htmlContent = marked.parse(markdown);
                        document.getElementById('wiki-container').innerHTML = htmlContent;
                    })
                    .catch(error => {
                        console.error('Error fetching the markdown file:', error);
                    });
            } else {
                document.getElementById('wiki-container').innerHTML = 'No wiki entry specified.';
            }
        });
    </script>
</head>

<body>
    <div id="wiki-container"></div>
</body>

</html>
