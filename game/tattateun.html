<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Made by tattaTeun</title>
	<link rel="stylesheet" href="game.css">
</head>

<body>
	<button id="button">TattaTeun wint een C02 meter!</button>
	<div id="textBox"></div>
	<canvas id="confetti"></canvas>
	<audio id="wachtMuziekje" src="wachtMuziekje.mp3" type="audio/mp3"></audio>
	<audio id="winnaar" src="winnaar.mp3" type="audio/mp3"></audio>
	
	<script src="confetti.js"></script>
	
	<script>
		document.addEventListener('DOMContentLoaded', function () {
			const button = document.getElementById('button');
			const textBox = document.getElementById('textBox');
			let names = []; 

			fetch('game.csv')
			.then(response => response.text())
			.then(data => {
				names = data.split(',');
				console.log(names);
			});
	
			button.addEventListener('click', function () {
				document.getElementById('wachtMuziekje').play();
				document.getElementById('confetti').style.display = 'none';
				let currentIndex = 0;
				const intervalTime = 300;
				const totalTime = 6900;
				const interval = setInterval(function () {
					if(names.length > 0){ // Check if names is not empty
						textBox.textContent = names[currentIndex];
						currentIndex = (currentIndex + 1) % names.length;
					}
				}, intervalTime);
	
				setTimeout(function () {
					clearInterval(interval);
					if(names.length > 0){ // Check if names is not empty
						const randomIndex = Math.floor(Math.random() * names.length);
						textBox.textContent = "tattaTeun"; // Always display "tattaTeun"
						}
				}, totalTime);
	
				// Show the confetti and play sound after x seconds
				setTimeout(function () {
					document.getElementById('confetti').style.display = 'block';
					document.getElementById('winnaar').play();
				}, totalTime + 100); // Adjust time as needed
			});
		});
	</script>
</body>

</html>
