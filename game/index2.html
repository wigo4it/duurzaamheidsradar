<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fun Fair Game</title>
	<style>
		@font-face {
			font-family: 'Anderson Four Feather Falls';
			src: url('Anderson Four Feather Falls.ttf') format('truetype');
		}

		#confetti {
			display: none;
			/* Hide canvas initially */
		}

		body {
			display: flex;
			flex-direction: column;
			/* Stacks items vertically */
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
			background-image: url('game.png');
			/* Sets the background image to game.png */
			background-size: cover;
			/* Ensures the background covers the entire area */
			background-position: center top 5px;
			/* Centers the background image and offsets it 100px from the top */
		}

		#randomNameButton {
			width: 250px;
			height: 250px;
			font-size: 40px;
			border: none;
			cursor: pointer;
			border-radius: 50%;
			border: 6px solid #9f2f90;
			/* Creates a border around the box */
			display: flex;
			justify-content: center;
			align-items: center;
			font-family: 'Anderson Four Feather Falls', sans-serif;
			position: fixed;
			top: calc(50% - 170px);
			left: 50%;
			padding-top: 20px;
			transform: translate(-50%, -50%);
			background: linear-gradient(to bottom, #FF85A2 0%, #BB4EAC 100%);
			box-shadow: 0 15px 25px rgba(0, 0, 0, 0.6), 0 5px 10px rgba(0, 0, 0, 0.4);
			/* Enhanced shadow for more depth */
			transition: box-shadow 0.2s, transform 0.2s;
			/* Smooth transition for shadow and position */
		}

		#randomNameButton:active {
			box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);
			/* Reduced shadow for pressed effect */
			transform: translate(-50%, -48%) scale(0.98);
			/* Slightly move down and scale down */
		}

		#displayName {
			position: fixed;
			/* Keeps the display number's position fixed */
			top: calc(50% - 60px);
			/* Positions the number just above the center, below the button */
			left: 50%;
			/* Centers the number horizontally */
			transform: translateX(-50%);
			/* Adjusts for exact horizontal centering */
			min-width: 200px;
			display: inline-block;
			/* Adjust width based on content */
			/* Sets the width of the box to 100px */
			height: 130px;
			/* Sets the height of the box to 100px */
			font-size: 90px;
			/* Keeps the doubled font size for the displayed number */
			font-family: 'Anderson Four Feather Falls', sans-serif;
			/* Maintains the custom font */
			color: #005452;
			margin-top: 60px;
			/* Adds space between the button and the number */
			padding: 20px;
			/* Adds padding around the text */
			border: 6px solid #005452;
			/* Creates a border around the box */
			background-color: white;
			/* Sets the background color of the box to white */
			box-sizing: border-box;
			/* Ensures padding and border are included in the element's total width and height */
			display: flex;
			/* Enables flexbox properties */
			justify-content: center;
			/* Centers content horizontally */
			align-items: center;
			/* Centers content vertically */
			overflow: hidden;
			/* Hides any overflow */
			border-radius: 20px;
			/* Makes corners of the box round */
		}

		h1 {
			position: absolute;
			margin-top: 30vh;
			width: 100%;
			text-align: center;
			font-size: 333%;
			font-family: sans-serif;
			color: grey;
			opacity: 0.5;
		}

		canvas {
			overflow-y: hidden;
			overflow-x: hidden;
			width: 100%;
			margin: 0;
		}


		@keyframes blink {
			0% {
				opacity: 1;
			}

			50% {
				opacity: 0;
			}

			100% {
				opacity: 1;
			}
		}
	</style>
</head>

<body>

	<button id="randomNameButton">Wie wint de C02 meter?</button>
	<div id="displayName"></div>
	<canvas id="confetti"></canvas>
	<audio id="wachtMuziekje" src="wachtMuziekje.mp3" type="audio/mp3"></audio>
	<audio id="winnaar" src="winnaar.mp3" type="audio/mp3"></audio>

	<script src="confetti.js"></script>

	<script>
		document.addEventListener('DOMContentLoaded', function () {
			const names = ["Dian", "Jean-Paul", "Sabine", "John"];
			const button = document.getElementById('randomNameButton');
			const displayName = document.getElementById('displayName');

			button.addEventListener('click', function () {
				document.getElementById('wachtMuziekje').play();
				let currentIndex = 0;
				const intervalTime = 200; // Time between name changes, adjust as needed
				const totalTime = 23000; // Total time to loop through names
				const interval = setInterval(function () {
					displayName.textContent = names[currentIndex];
					currentIndex = (currentIndex + 1) % names.length;
				}, intervalTime);
				
				setTimeout(function () {
					clearInterval(interval); // Stop changing names
					// Display a random name as the final name
					const randomIndex = Math.floor(Math.random() * names.length);
					displayName.textContent = names[randomIndex]; // Display the random name
					// Start confetti effect here
				}, totalTime);

				// Show the confetti and play sound after x seconds
				setTimeout(function () {
					document.getElementById('confetti').style.display = 'block';
					document.getElementById('winnaar').play();
				}, 23100);

				// Hide the confetti and sound after x seconds
				setTimeout(function () {
					document.getElementById('confetti').style.display = 'none';
					const winnaar = document.getElementById('winnaar');
					winnaar.pause(); // Stop playing the sound
					winnaar.currentTime = 0; // Reset the sound to the beginning
				}, 30000);

			});
		});

		function startConfetti() {
			// Your confetti.js start script here
			// Example: confetti.start();
		}
	</script>
</body>

</html>
